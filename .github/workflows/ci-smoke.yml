name: CI Smoke Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: pytest -q
      - name: CLI smoke run
        run: |
          mkdir -p /tmp/ci-smoke
          python main.py sweep_overrides params.yaml --param beta_uncertainty --values "0.5,1.0" --scenario hybrid --utilization 1.1 --seeds "1,2" --days 2 --n_jobs 2 --out_dir /tmp/ci-smoke
          ls /tmp/ci-smoke

