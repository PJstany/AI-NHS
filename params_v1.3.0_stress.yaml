sim:
  days: 30
  sessions_per_day: 2
  slots_per_session: 60
  seeds: [101, 102, 103]
  scenario: "hybrid"   # baseline | ai_only | imperfect_ai | hybrid
  utilization: 1.15    # CHANGED: 15% over capacity to stress the system

arrivals:
  urgent_rate_per_day: 18
  routine_rate_per_day: 120
  digital_access_gap:
    A: 1.0
    B: 0.8  # <1.0 means fewer B arrive (gap)

patience_days:
  urgent_mean: 7
  routine_mean: 3

service_mixtures:
  # Mixture of short admin and long complex consults (minutes)
  short_mean: 10
  long_mean: 25
  long_weight: 0.3

no_show:
  probability: 0.07
  reschedule_rule: "backlog"  # backlog | drop

bias_calibration:
  # subgroup-specific (A/B) slope & intercept for predicted risk
  # CHANGED: Group B now disadvantaged - no intercept bonus, slope underestimates risk
  slope:
    A: 1.0
    B: 0.8    # Group B scored lower for same true risk (underestimation)
  intercept:
    A: 0.0
    B: 0.0    # CHANGED: Removed the +0.2 bonus that was washing out the bias
  noise_sd:
    A: 0.05
    B: 0.10   # Group B has more prediction noise (less reliable)
  score_inflation: 0.00

overrides:
  target_rate: 0.25           # used to calibrate intercept
  beta_uncertainty: 1.5
  beta_queue: 0.1
  beta_time_of_day: 0.2
  sd_clinician_random_effect: 0.5

thresholds_days:
  same_day: 0
  within_3d: 3
  within_14d: 14

output:
  out_dir: "outputs"
  write_overrides_log: true

analysis:
  warmup_days: 14
